<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>[UN] Unison | Sound Design Online</title>
    <meta
      name="description"
      content="Creating Sounds for Electronic Music using web audio."
    />
    <link
      rel="stylesheet"
      href="https://stevecherry.net/normcore/css/normcore.css"
    />
    <link rel="stylesheet" href="../public/style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/@ungap/custom-elements@1.3.0/es.js"
      defer
    ></script>
    <script
      src="https://stevecherry.net/normcore/js/normcore.js"
      defer
    ></script>
    <script src="../public/script.js" defer></script>
    <script src="./un.js" type="module"></script>
  </head>
  <body>
    <div class="center cover">
      <header role="banner">
        <a href="../">Sound Design Online</a>
      </header>
      <main class="[ stack ] [ fx-auto ]" role="main">
        <h1>[UN] Unison</h1>
        <div class="grid">
          <fieldset id="synth-oscillator">
            <legend>Oscillator</legend>
            <label for="synth-oscillator-type">Type</label>
            <select
              id="synth-oscillator-type"
              name="synth-oscillator-type"
              value="fatsawtooth"
            >
              <option value="fatsine">fatsine</option>
              <option value="fattriangle">fattriangle</option>
              <option value="fatsquare">fatsquare</option>
              <option value="fatsawtooth" selected>fatsawtooth</option>
            </select>
            <fieldset id="synth-oscillator-detune">
              <legend>Detune</legend>
              <label for="synth-oscillator-detune-octave">Octave</label>
              <input
                type="range"
                id="synth-oscillator-detune-octave"
                name="synth-oscillator-detune-octave"
                min="-3600"
                max="3600"
                step="1200"
                value="0"
              />
              <output is="output-sync" for="synth-oscillator-detune-octave"
                >0</output
              >
              <label for="synth-oscillator-detune-coarse">Coarse</label>
              <input
                type="range"
                id="synth-oscillator-detune-coarse"
                name="synth-oscillator-detune-coarse"
                min="-1200"
                max="1200"
                step="100"
                value="0"
              />
              <output is="output-sync" for="synth-oscillator-detune-coarse"
                >0</output
              >
              <label for="synth-oscillator-detune-fine">Fine</label>
              <input
                type="range"
                id="synth-oscillator-detune-fine"
                name="synth-oscillator-detune-fine"
                min="-100"
                max="100"
                step="1"
                value="0"
              />
              <output is="output-sync" for="synth-oscillator-detune-fine"
                >0</output
              >
            </fieldset>
            <label for="synth-oscillator-phase">Phase</label>
            <input
              type="range"
              id="synth-oscillator-phase"
              name="synth-oscillator-phase"
              min="-180"
              max="180"
              step="1"
              value="0"
            />
            <output is="output-sync" for="synth-oscillator-phase">0</output>
          </fieldset>
          <fieldset id="synth-envelope">
            <legend>Envelope</legend>
            <fieldset id="synth-envelope-envelope">
              <legend>Envelope</legend>
              <label for="synth-envelope-envelope-attack">Attack</label>
              <input
                type="range"
                id="synth-envelope-envelope-attack"
                name="synth-envelope-envelope-attack"
                min="0"
                max="1"
                step="0.001"
                value="0.01"
              />
              <output is="output-sync" for="synth-envelope-envelope-attack"
                >0.01</output
              >
              <label for="synth-envelope-envelope-decay">Decay</label>
              <input
                type="range"
                id="synth-envelope-envelope-decay"
                name="synth-envelope-envelope-decay"
                min="0"
                max="1"
                step="0.001"
                value="0.1"
              />
              <output is="output-sync" for="synth-envelope-envelope-decay"
                >0.1</output
              >
              <label for="synth-envelope-envelope-sustain">Sustain</label>
              <input
                type="range"
                id="synth-envelope-envelope-sustain"
                name="synth-envelope-envelope-sustain"
                min="0"
                max="1"
                step="0.001"
                value="0.5"
              />
              <output is="output-sync" for="synth-envelope-envelope-sustain"
                >0.5</output
              >
              <label for="synth-envelope-envelope-release">Release</label>
              <input
                type="range"
                id="synth-envelope-envelope-release"
                name="synth-envelope-envelope-release"
                min="0"
                max="1"
                step="0.001"
                value="1"
              />
              <output is="output-sync" for="synth-envelope-envelope-release"
                >1</output
              >
            </fieldset>
          </fieldset>
          <fieldset id="chorus">
            <legend>Chorus</legend>
            <label for="chorus-frequency">Frequency</label>
            <input
              type="range"
              id="chorus-frequency"
              name="chorus-frequency"
              min="0"
              max="10"
              step="0.001"
              value="2"
            />
            <output is="output-sync" for="chorus-frequency">2</output>
            <label for="chorus-delay-time">Delay time</label>
            <input
              type="range"
              id="chorus-delay-time"
              name="chorus-delay-time"
              min="0"
              max="2"
              step="0.001"
              value="0"
            />
            <output is="output-sync" for="chorus-delay-time">0</output>
            <label for="chorus-depth">Depth</label>
            <input
              type="range"
              id="chorus-depth"
              name="chorus-depth"
              min="0"
              max="1"
              step="0.001"
              value="0.7"
            />
            <output is="output-sync" for="chorus-depth">0.7</output>
          </fieldset>
        </div>
        <label for="piano-mode">Mode</label>
        <select id="piano-mode" name="piano-mode" value="button">
          <option value="button" selected>button</option>
          <option value="toggle">toggle</option>
          <option value="impulse">impulse</option>
        </select>
        <div id="piano-piano"></div>
      </main>
      <footer class="stack" role="contentinfo">
        <p>Creating Sounds for Electronic Music using web audio.</p>
        <p>
          Yet
          <a href="https://github.com/ok-steve/sound-design-online#readme"
            >another project</a
          >
          by <a href="https://stevecherry.net">Steve Cherry</a>.
        </p>
      </footer>
    </div>
  </body>
</html>
